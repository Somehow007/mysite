services:
  mysql:
    container_name: mysite-mysql
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Sh20060401}
      MYSQL_DATABASE: mysite
      TZ: Asia/Shanghai
    volumes:
      - ./mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=64M
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - mysite-network

  redis:
    container_name: mysite-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command:
      - redis-server
      - --appendonly yes
      - --maxmemory 100M
      - --maxmemory-policy allkeys-lru
    networks:
      - mysite-network

# volumes:
#   mysql_data:
#   redis_data:
#   es_data:

networks:
  mysite-network:
    driver: bridge
