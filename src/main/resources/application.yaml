spring:
  application:
    name: mysite
  servlet:
    multipart:
      enabled: true
      max-file-size: 6MB
      max-request-size: 12MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mysite?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Sh20060401
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms
    elasticsearch:
      repositories:
        enabled: false
  elasticsearch:
    uris: http://localhost:9200

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  default-flat-param-object: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: io.github.somehow.mysite

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: mysite-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-2026
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000

elasticsearch:
  enabled: false
  uris:
    - http://localhost:9200
  connection-timeout: 5000
  socket-timeout: 30000

image:
  upload:
    base-path: ./uploads/images
    max-file-size: 5MB
    allowed-types: image/jpeg,image/png,image/gif,image/webp,image/svg+xml
    url-path: /uploads/images/
    max-uploads-per-minute: 10
    url-fetch-connect-timeout: 5000
    url-fetch-read-timeout: 15000
