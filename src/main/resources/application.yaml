spring:
  application:
    name: mysite
  servlet:
    multipart:
      enabled: true
      max-file-size: 6MB
      max-request-size: 12MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mysite?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Sh20060401
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms
    elasticsearch:
      repositories:
        enabled: false
  elasticsearch:
    uris: http://localhost:9200

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  default-flat-param-object: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: io.github.somehow.mysite

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: mysite-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-2026
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000

elasticsearch:
  enabled: false
  uris:
    - http://localhost:9200
  connection-timeout: 5000
  socket-timeout: 30000

image:
  upload:
    base-path: ./uploads/images
    max-file-size: 5MB
    allowed-types: image/jpeg,image/png,image/gif,image/webp,image/svg+xml
    url-path: /uploads/images/
    max-uploads-per-minute: 10
    url-fetch-connect-timeout: 5000
    url-fetch-read-timeout: 15000

# ============ RAG 配置 ============
rag:
  # PostgreSQL 数据源（RAG 专用）
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ragent
    username: ragent
    password: ${RAGENT_PG_PASSWORD:ragent123}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  # LLM 供应商配置（优先级从高到低）
  llm:
    providers:
      # P1: 阿里百炼 —— 国内首选，延迟低，中文能力强
      bailian:
        enabled: true
        priority: 1
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${BAILIAN_API_KEY:sk-58d0aa5347a242e2b5da0bccdd6d3dc4}
        chat-model: qwen3-max
        embedding-model: text-embedding-v4
        rerank-model: gte-rerank
        chat-timeout: 120s
        embedding-timeout: 30s

      # P2: SiliconFlow —— 备选，模型选择丰富
      siliconflow:
        enabled: false
        priority: 2
        base-url: https://api.siliconflow.cn/v1
        api-key: ${SILICONFLOW_API_KEY:}
        chat-model: glm-4.7
        embedding-model: BAAI/bge-large-zh-v1.5
        chat-timeout: 120s
        embedding-timeout: 30s

      # P3: AIHubMix —— 国际模型代理
      aihubmix:
        enabled: false
        priority: 3
        base-url: https://aihubmix.com/v1
        api-key: ${AIHUBMIX_API_KEY:}
        chat-model: gpt-5.4
        embedding-model: text-embedding-3-small
        chat-timeout: 120s
        embedding-timeout: 30s

      # P9: 本地 Ollama —— 最低优先级兜底
      ollama:
        enabled: false
        priority: 9
        base-url: http://localhost:11434/v1
        api-key: ""
        chat-model: qwen3:8b
        embedding-model: qwen3-embedding
        chat-timeout: 180s
        embedding-timeout: 60s

    # 断路器全局参数
    circuit-breaker:
      failure-threshold: 2       # 连续失败 N 次 → 熔断
      cooldown-seconds: 30       # 熔断后冷却 N 秒 → 半开
      first-packet-timeout: 60   # 首包探测超时（秒）

  # 分块参数
  chunk:
    size: 800
    overlap: 100
    max-chunks-per-doc: 50

  # 检索参数
  retrieval:
    top-k: 10
    rerank-top-k: 5
    score-threshold: 0.3

  # 对话记忆
  memory:
    keep-turns: 6
    summary-turns: 10
    summary-enabled: false   # Phase 3 先不做摘要，保持简单

  # 异步线程池
  async:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 100
