version: '3.8'
services:
  artalk:
    container_name: artalk
    image: artalk/artalk-go:latest
    restart: unless-stopped
    ports:
      - "23366:23366"
    volumes:
      - ./artalk-data:/data
      - ./artalk.yml:/data/artalk.yml:ro
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:23366/api/stat"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - artalk-network

networks:
  artalk-network:
    driver: bridge
