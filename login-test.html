<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>登录测试</h1>
    <form id="loginForm">
        <div>
            <label for="username">用户名:</label>
            <input type="text" id="username" value="testuser2">
        </div>
        <div>
            <label for="password">密码:</label>
            <input type="password" id="password" value="123456">
        </div>
        <button type="submit">登录</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await axios.post('http://localhost:8081/v1/auth/login', {
                    username: username,
                    password: password
                });
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(response.data, null, 2) + '</pre>';
                
                // 测试获取用户信息
                const tokens = response.data.data;
                const userResponse = await axios.get('http://localhost:8081/v1/auth/me', {
                    headers: {
                        'Authorization': 'Bearer ' + tokens.accessToken
                    }
                });
                document.getElementById('result').innerHTML += '<h2>用户信息:</h2><pre>' + JSON.stringify(userResponse.data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<pre>错误: ' + JSON.stringify(error.response?.data || error.message, null, 2) + '</pre>';
            }
        });
    </script>
</body>
</html>
