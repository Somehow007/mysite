<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="description" content="MySite - 个人博客">
    <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: dark)">
    <meta name="format-detection" content="telephone=no">
    <title>MySite</title>
    <style>
      @font-face {
        font-family: 'Inter Fallback';
        src: local('BlinkMacSystemFont'), local('Segoe UI'), local('Helvetica Neue'), local('Arial');
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <script>
      ;(function(){var t=localStorage.getItem('mysite_theme_v2')||'classic-light';document.documentElement.setAttribute('data-theme',t);var d=t.includes('dark')||t==='aurora';document.documentElement.classList.toggle('dark',d);document.documentElement.style.colorScheme=d?'dark':'light'})()
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
