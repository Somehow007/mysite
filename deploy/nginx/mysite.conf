# 博客 - HTTPS (443端口，绑定域名)
server {
    listen 443 ssl;
    server_name somehow007.top www.somehow007.top;

    # SSL 证书（由 Certbot 管理）
    ssl_certificate /etc/letsencrypt/live/somehow007.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/somehow007.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    charset utf-8;

    root /var/www/mysite;
    index index.html;

    access_log /var/log/nginx/mysite.access.log;
    error_log /var/log/nginx/mysite.error.log;

    client_max_body_size 6m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 9;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/xml+rss application/wasm font/woff font/woff2 image/svg+xml;
    gzip_disable "msie6";

    etag on;

    # 上传文件
    location ^~ /uploads/ {
        alias /data/mysite/uploads/;

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        add_header Vary "Accept-Encoding";
        access_log off;

        location ~* ^/uploads/images/.+\.(png|jpg|jpeg)$ {
            add_header Vary "Accept";
            if ($http_accept ~* "image/webp") {
                rewrite (.*)$1.webp last;
            }
        }

        location ~* \.webp$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            add_header Vary "Accept";
            access_log off;
            try_files $uri =404;
        }
    }

    # 静态文件 + SPA fallback
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # API 代理到 Java 后端
    location ~ ^/v[0-9]/ {
        proxy_pass http://localhost:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api/ {
        proxy_pass http://localhost:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Artalk 评论
    location /artalk/ {
        proxy_pass http://localhost:23366/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(log|bak|sql|conf|ini)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# HTTP → HTTPS 自动跳转
server {
    listen 80;
    server_name somehow007.top www.somehow007.top;
    return 301 https://$host$request_uri;
}

